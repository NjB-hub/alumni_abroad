<section class=" p-5  m-1">
        <div class="row ">
            <div class="col-lg-6 col text-center my-3">
                <img src="assets/images/logoEAA.jpeg" width="200" height="200" alt="Logo du site" />
                <p class="quote">Let's reconnect !</p>
            </div>

            <div class="col-lg-4 col p-4 m-sm-5 form shadow-lg" >
                <form [formGroup]="signinForm" (ngSubmit)="onSubmit()" ngNativeValidate>
                    <div class="signinMessage alert-danger"
                    *ngIf="signinMessage != '' ">
                        <p>{{signinMessage}}</p>
                    </div>
                    <div class="signinMessage alert-success"
                    *ngIf="signinSuccessMessage != '' ">
                        <p>{{signinSuccessMessage}}</p>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email"
                         class="form-control"
                          id="email" 
                          formControlName="email"
                          required />
                    </div>
                    <div class="mb-1 small text-danger" *ngIf="email?.errors?.email">
                        <p>Enter a valid email address!</p>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="passwordDiv">
                            <input type="password"
                                    class="form-control"
                                    id="password"
                                    formControlName="password"
                                    appPassword 
                                    required />
                        </div>
                        
                        <div class="mb-1 small text-danger" *ngIf="password?.errors?.required">
                            <p>The password is required!</p>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="check">
                        <label class="form-check-label" for="check">Check me out</label>
                    </div>
                    <div class="text-center">
                        <button type="submit" 
                        class="btn btn--outline-primary"
                        [ngClass]="{'btn--disabled':signinForm.invalid}"
                        >Sign in</button>
                    </div>
                    <div class="text-center mt-2">
                        <a routerLink="/auth/forgotpassword" class="fromleft">Forgot password ?</a>
                    </div>  
                    <hr>
                    <div class="text-center mt-2">
                        <a routerLink="/auth/signup">Don't have an account ? Sign up</a>
                    </div>   
                </form>
                
                <div class=" d-flex align-items-end flex-column mt-2 " >
                    <br>
                    <a routerLink="/">Go back to home</a>
                </div>
            </div>
        </div>

</section>
